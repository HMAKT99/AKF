name: Bug Report
description: Report a bug in AKF
labels: [bug]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Minimal code or steps to reproduce the issue
      render: python
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: AKF Version
      placeholder: "1.0.0"
    validations:
      required: true
  - type: dropdown
    id: sdk
    attributes:
      label: SDK
      options:
        - Python
        - TypeScript
        - Both
    validations:
      required: true
