[build-system]
requires = ["setuptools>=68.0"]
build-backend = "setuptools.build_meta"

[project]
name = "langchain-akf"
version = "0.1.0"
description = "LangChain integration for Agent Knowledge Format (AKF)"
requires-python = ">=3.10"
dependencies = [
    "akf>=1.0.0",
    "langchain-core>=0.1.0",
]

[project.optional-dependencies]
dev = ["pytest>=7.0"]
