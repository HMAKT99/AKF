[build-system]
requires = ["setuptools>=68.0"]
build-backend = "setuptools.build_meta"

[project]
name = "llama-index-akf"
version = "0.1.0"
description = "LlamaIndex integration for Agent Knowledge Format (AKF)"
requires-python = ">=3.10"
dependencies = [
    "akf>=1.0.0",
    "llama-index-core>=0.10.0",
]

[project.optional-dependencies]
dev = ["pytest>=7.0"]
